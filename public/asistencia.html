<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia</title>
</head>
<body>

<h1>Confirme su asistencia</h1>

<form id="formNombre">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="text" name="apellido" placeholder="Apellido" required>
    <button type="submit">Guardar</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const cliente = supabase.createClient(
    "https://fjiabjaovullgvzchgxy.supabase.co",
    "sb_publishable_IKlz5qC_uerRcV9JD9qkwg_Q8wXIKxQ"
);

const form = document.getElementById("formNombre");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nombre = form.nombre.value;
    const apellido = form.apellido.value;

    const { error } = await cliente
        .from("nombres")
        .insert([{ nombre, apellido }]);

    if (error) {
        alert("Error 😢");
        console.log(error);
    } else {
        alert("Guardado 😎");
        form.reset();
    }
});
</script>

</body>
</html>
